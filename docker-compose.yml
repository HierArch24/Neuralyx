services:
  frontend:
    container_name: neuralyx-frontend
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - postgres
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}

  postgres:
    container_name: neuralyx-postgres
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: neuralyx
      POSTGRES_USER: neuralyx
      POSTGRES_PASSWORD: neuralyx_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  mcp-server:
    container_name: neuralyx-mcp
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
    ports:
      - "8080:8080"
    environment:
      - SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - postgres

volumes:
  postgres_data:
