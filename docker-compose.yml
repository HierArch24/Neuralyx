services:
  frontend:
    container_name: neuralyx-frontend
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-https://phpdxvaowytijhvclljb.supabase.co}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBocGR4dmFvd3l0aWpodmNsbGpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjE4ODksImV4cCI6MjA4OTQ5Nzg4OX0.ClHZrdLj47HKUiDTfh6oolx3zRtD_dO2kidjfqY92nY}
        VITE_MCP_SERVER_URL: ${VITE_MCP_SERVER_URL:-http://localhost:8080}
        VITE_OPENAI_KEY: ${VITE_OPENAI_KEY:-}
        VITE_GEMINI_KEY: ${VITE_GEMINI_KEY:-}
    ports:
      - "3000:80"
    depends_on:
      - postgres

  postgres:
    container_name: neuralyx-postgres
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: neuralyx
      POSTGRES_USER: neuralyx
      POSTGRES_PASSWORD: neuralyx_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  mcp-server:
    container_name: neuralyx-mcp
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
    ports:
      - "8080:8080"
    environment:
      - SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - UPLOADS_DIR=/app/uploads
      - JSEARCH_API_KEY=${JSEARCH_API_KEY:-}
      - ADZUNA_APP_ID=${ADZUNA_APP_ID:-}
      - ADZUNA_APP_KEY=${ADZUNA_APP_KEY:-}
      - OPENAI_KEY=${VITE_OPENAI_KEY:-}
      - GEMINI_KEY=${VITE_GEMINI_KEY:-AIzaSyCNcGN8E28I3y9JWUQsrAKdJrVsVWYUObI}
      - SEARXNG_URL=http://neuralyx-searxng:8080
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USER=${SMTP_USER:-gabrielalvin.jobs@gmail.com}
      - SMTP_PASS=${SMTP_PASS:-roakebmrqefilgpl}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Gabriel Alvin Aquino}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-gabrielalvin.jobs@gmail.com}
    volumes:
      - uploads_data:/app/uploads
      - ./wiki:/app/wiki
    depends_on:
      - postgres

  ai-service:
    container_name: neuralyx-ai
    build:
      context: .
      dockerfile: docker/Dockerfile.ai-service
    ports:
      - "8090:8090"
    environment:
      - MCP_SERVER_URL=http://neuralyx-mcp:8080
    depends_on:
      - mcp-server
    restart: unless-stopped

  searxng:
    container_name: neuralyx-searxng
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
    volumes:
      - searxng_data:/etc/searxng
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  searxng_data:
