name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to cPanel via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: /home/devenvir/neuralyx.ai.dev-environment.site/
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 27015 dev-environment.site >> ~/.ssh/known_hosts 2>/dev/null

          rsync -avz --delete \
            --exclude='assets/videos/' \
            -e "ssh -i ~/.ssh/deploy_key -p 27015 -o StrictHostKeyChecking=no" \
            ./dist/ devenvir@dev-environment.site:$DEPLOY_PATH
